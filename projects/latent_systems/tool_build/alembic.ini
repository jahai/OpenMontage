# Alembic config for latent_systems tool_build v1.
# Database URL is resolved dynamically by migrations/env.py — the value here
# is a placeholder so Alembic doesn't error on missing config.

[alembic]
script_location = migrations
sqlalchemy.url = sqlite:///_data/state.db

# Additional paths to include in version path resolution.
prepend_sys_path = .

# Use absolute paths for version files so cwd doesn't affect discovery.
version_path_separator = os

# Logging — keep minimal; serve.py controls operational logging.
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
